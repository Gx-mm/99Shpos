<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Signup - 99Shops</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f1f3f6;padding:20px}
.auth-container{width:100%;max-width:500px}
.auth-card{background:#fff;padding:35px;border-radius:24px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
.logo{text-align:center;font-size:36px;font-weight:800;color:#2874f0;margin-bottom:25px}
.tab-buttons{display:flex;background:#f5f5f5;border-radius:14px;padding:5px;margin-bottom:25px}
.tab-btn{flex:1;height:50px;border:none;background:transparent;font-size:16px;font-weight:700;cursor:pointer;border-radius:10px;transition:.3s}
.tab-btn.active{background:#2874f0;color:#fff}
.auth-form{display:none}
.active-form{display:block}
.auth-form h2{font-size:28px;margin-bottom:8px}
.subtitle{color:#666;margin-bottom:20px}
.auth-form input{width:100%;height:55px;padding:0 15px;border:1px solid #ddd;border-radius:12px;margin-bottom:15px;font-size:15px;outline:none}
.submit-btn{width:100%;height:55px;border:none;background:#2874f0;color:#fff;font-size:16px;font-weight:700;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.submit-btn:disabled{opacity:.7;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite;display:none}
.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

.toast-container{position:fixed;top:20px;right:20px;z-index:9999}
.toast{min-width:280px;padding:16px 18px;border-radius:18px;color:#fff;backdrop-filter:blur(20px);margin-bottom:12px;box-shadow:0 10px 35px rgba(0,0,0,.2);animation:slideIn .3s ease}
.toast.success{background:rgba(25,135,84,.92)}
.toast.error{background:rgba(220,53,69,.92)}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="auth-container">
<div class="auth-card">
<div class="logo">99Shops</div>

<div class="tab-buttons">
<button class="tab-btn active" id="loginTab" type="button">Login</button>
<button class="tab-btn" id="signupTab" type="button">Sign Up</button>
</div>

<form id="loginForm" class="auth-form active-form">
<h2>Welcome Back</h2>
<p class="subtitle">Login to continue shopping</p>
<input id="loginEmail" type="email" placeholder="Email Address" required>
<input id="loginPassword" type="password" placeholder="Password" required>
<button type="submit" class="submit-btn" id="loginBtn"><span class="spinner"></span><span>Login</span></button>
</form>

<form id="signupForm" class="auth-form">
<h2>Create Account</h2>
<p class="subtitle">Join 99Shops today</p>
<input id="signupName" type="text" placeholder="Full Name" required>
<input id="signupEmail" type="email" placeholder="Email Address" required>
<input id="signupPhone" type="tel" placeholder="Phone Number" required>
<input id="signupPassword" type="password" placeholder="Password" required>
<input id="signupConfirmPassword" type="password" placeholder="Confirm Password" required>
<button type="submit" class="submit-btn" id="signupBtn"><span class="spinner"></span><span>Create Account</span></button>
</form>
</div>
</div>

<script>
const SUPABASE_URL="https://xjiwwapiqszpnoqaripq.supabase.co";
const SUPABASE_KEY="sb_publishable_TJQTU1yv270qrVAEW6Ygwg_HxRtmCTe";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function toast(msg,type="success"){
 const t=document.createElement("div");
 t.className=`toast ${type}`;
 t.textContent=msg;
 document.getElementById("toastContainer").appendChild(t);
 setTimeout(()=>t.remove(),3500);
}

function setLoading(btn,state){
 btn.disabled=state;
 btn.classList.toggle("loading",state);
}

loginTab.onclick=()=>{
loginTab.classList.add("active");
signupTab.classList.remove("active");
loginForm.classList.add("active-form");
signupForm.classList.remove("active-form");
};

signupTab.onclick=()=>{
signupTab.classList.add("active");
loginTab.classList.remove("active");
signupForm.classList.add("active-form");
loginForm.classList.remove("active-form");
};

loginForm.addEventListener("submit",async(e)=>{
e.preventDefault();
const btn=document.getElementById("loginBtn");
setLoading(btn,true);

try{
const email=loginEmail.value.trim();
const password=loginPassword.value;

const {data,error}=await client.from("users").select("*").eq("email",email).eq("password",password).single();

if(error||!data){
toast("Invalid Email or Password","error");
return;
}

localStorage.setItem("isLoggedIn","true");
localStorage.setItem("userId",data.id||"");
localStorage.setItem("userName",data.name||"");
localStorage.setItem("userEmail",data.email||"");
localStorage.setItem("userPhone",data.phone||"");

toast("Login Successful","success");
setTimeout(()=>{
    window.location.href="home.html";
},1000);
}catch(err){
toast(err.message||"Login failed","error");
}finally{
setLoading(btn,false);
}
});


signupForm.addEventListener("submit",async(e)=>{
e.preventDefault();
const btn=document.getElementById("signupBtn");
setLoading(btn,true);

try{
const name=signupName.value.trim();
const email=signupEmail.value.trim();
const phone=signupPhone.value.trim();
const password=signupPassword.value;
const confirm=signupConfirmPassword.value;

if(password!==confirm){
toast("Passwords do not match","error");
return;
}

const emailCheck=await client.from("users").select("id").eq("email",email);
if(emailCheck.data && emailCheck.data.length){
toast("Email already exists","error");
return;
}

const phoneCheck=await client.from("users").select("id").eq("phone",phone);
if(phoneCheck.data && phoneCheck.data.length){
toast("Phone already exists","error");
return;
}

const {data,error}=await client.from("users").insert([{
name,email,phone,password,profile_image:"",role:"user",is_active:true
}]).select().single();

if(error){
toast(error.message,"error");
return;
}

localStorage.setItem("isLoggedIn","true");
localStorage.setItem("userId",data?.id||"");
localStorage.setItem("userName",name);
localStorage.setItem("userEmail",email);
localStorage.setItem("userPhone",phone);

toast("Account Created Successfully","success");
setTimeout(()=>{
    window.location.href="home.html";
},1000);
}catch(err){
toast(err.message||"Signup failed","error");
}finally{
setLoading(btn,false);
}
});
// Login Check
const userId = localStorage.getItem("userId");

if(userId){
window.location.href = "home.html";
}


document.addEventListener("DOMContentLoaded",()=>{

const userId =
localStorage.getItem("userId");

const loggedIn =
localStorage.getItem("loggedIn");

if(userId || loggedIn==="true"){

window.location.replace("home.html");

}

});

</script>
</body>
</html>
