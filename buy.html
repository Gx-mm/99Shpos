<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - 99Shops</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5;padding:15px}
.container{max-width:700px;margin:auto}
.card{background:#fff;padding:20px;border-radius:16px;margin-bottom:15px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.product{display:flex;gap:15px;align-items:center}
.product img{width:100px;height:100px;object-fit:cover;border-radius:10px}
.product-name{font-size:18px;font-weight:700}
.price{font-size:22px;font-weight:700;margin-top:5px}
input,textarea{width:100%;padding:14px;margin-top:10px;border:1px solid #ddd;border-radius:10px;font-size:16px}
.btn{width:100%;height:55px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:18px;font-weight:700;margin-top:15px;cursor:pointer}
.payment-box{display:none}
.pay-option{border:1px solid #ddd;padding:15px;border-radius:12px;margin-top:10px;cursor:pointer}
.selected{border:2px solid #2563eb!important;background:#eff6ff}
.selected{border:2px solid #2563eb!important;background:#eff6ff}

/* YAHAN SE PASTE KARO */

.success-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeIn .3s ease;
}

.success-card{
background:#fff;
width:90%;
max-width:380px;
padding:30px;
border-radius:25px;
text-align:center;
animation:pop .4s ease;
}

.checkmark{
width:90px;
height:90px;
background:#22c55e;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
color:#fff;
animation:scale .5s ease;
}

.success-card h2{
margin-top:20px;
}

.success-card p{
margin-top:10px;
color:#666;
}

.success-card button{
margin-top:20px;
width:100%;
height:50px;
border:none;
border-radius:12px;
background:#2563eb;
color:#fff;
font-size:16px;
font-weight:700;
}

@keyframes pop{
0%{transform:scale(.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes scale{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* YAHAN TAK */

</style>
</head>

<body>

<div class="container">

<div class="card" id="step1">

<h2>Order Details</h2>

<div class="product">
<img id="productImage" src="">
<div>
<div class="product-name" id="productName">Loading...</div>
<div class="price" id="productPrice">₹0</div>
</div>
</div>

<input id="customerName" type="text" placeholder="Full Name">
<input id="customerPhone" type="tel" placeholder="Mobile Number">
<textarea id="address" placeholder="Full Address"></textarea>
<input id="pincode" type="text" placeholder="Pincode">
<input id="city" type="text" placeholder="City">
<input id="state" type="text" placeholder="State">

<button class="btn" onclick="goPayment()">
Continue To Payment
</button>

</div>

<div class="card payment-box" id="step2">

<h2>Select Payment Method</h2>

<div class="pay-option selected" data-payment="Online Payment">
💳 Online Payment
</div>

<div class="pay-option" data-payment="Smart Balance">
💰 Smart Balance
</div>

<button class="btn" onclick="placeOrder()">
Place Order
</button>

</div>

</div>

<script>
const SUPABASE_URL="https://xjiwwapiqszpnoqaripq.supabase.co";
const SUPABASE_KEY="sb_publishable_TJQTU1yv270qrVAEW6Ygwg_HxRtmCTe";

const client=window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let selectedPayment="Online Payment";
let currentProduct=null;

const params=new URLSearchParams(window.location.search);
const productId=params.get("id");

async function loadProduct(){

const {data,error}=await client
.from("products")
.select("*")
.eq("id",productId)
.single();

if(error){
console.log(error);
alert("Product not found");
return;
}

currentProduct=data;

document.getElementById("productImage").src=data.thumbnail||"";
document.getElementById("productName").innerText=data.name||"";
document.getElementById("productPrice").innerText="₹"+(data.price||0);
}

function goPayment(){

if(
!customerName.value ||
!customerPhone.value ||
!address.value ||
!city.value ||
!state.value ||
!pincode.value
){
alert("Please fill all details");
return;
}

document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";
}

document.querySelectorAll(".pay-option").forEach(option=>{
option.addEventListener("click",()=>{

document.querySelectorAll(".pay-option").forEach(el=>{
el.classList.remove("selected");
});

option.classList.add("selected");
selectedPayment=option.dataset.payment;

});
});

async function placeOrder(){

if(!currentProduct){
alert("Product not loaded");
return;
}

const userId = localStorage.getItem("userId");

if(!userId){
alert("Please login first");
return;
}

const {error}=await client
.from("orders")
.insert([{
user_id:userId,
product_id:currentProduct.id,
product_name:currentProduct.name,
product_image:currentProduct.thumbnail,
quantity:1,
price:currentProduct.price,
total_amount:currentProduct.price,
customer_name:document.getElementById("customerName").value.trim(),
customer_phone:document.getElementById("customerPhone").value.trim(),
address:document.getElementById("address").value.trim(),
city:document.getElementById("city").value.trim(),
state:document.getElementById("state").value.trim(),
pincode:document.getElementById("pincode").value.trim(),
payment_method:selectedPayment,
order_status:"Pending"
}]);

if(error){
console.log(error);
alert(error.message);
return;
}

if(error){
console.log(error);
alert(error.message);
return;
}

document.getElementById("successPopup").style.display="flex";
}

loadProduct();
loadUserAddress();

function goOrders(){
window.location.href="orders.html";
}

async function loadUserAddress(){

const userId = localStorage.getItem("userId");

if(!userId) return;

const {data,error} = await client
.from("addresses")
.select("*")
.eq("user_id",userId)
.single();

if(error || !data) return;

document.getElementById("customerName").value =
data.full_name || "";

document.getElementById("customerPhone").value =
data.phone || "";

document.getElementById("address").value =
data.address || "";

document.getElementById("city").value =
data.city || "";

document.getElementById("state").value =
data.state || "";

document.getElementById("pincode").value =
data.pincode || "";

}

</script>
<div id="successPopup" class="success-popup">

<div class="success-card">

<div class="checkmark">
✓
</div>

<h2>🎉 Order Placed Successfully</h2>

<p>
Thank you for shopping with 99Shops.
Your order has been placed successfully and is now being processed
</p>

<button onclick="goOrders()">
Track Order
</button>

</div>
</div>

</body>
</html>
